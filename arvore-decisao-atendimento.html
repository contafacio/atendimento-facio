let path = ["root"];

function crumbLabel(i) {
  if (i === 0) return "Início";
  const parentKey = path[i - 1];
  const opt = (tree[parentKey].opts || []).find(o => o.to === path[i]);
  return opt ? opt.label : path[i];
}

function render() {
  const bc = document.getElementById("breadcrumb");
  const content = document.getElementById("content");
  document.getElementById("search").value = "";

  bc.innerHTML = "";
  path.forEach((key, i) => {
    if (i > 0) {
      const sep = document.createElement("span");
      sep.textContent = "›";
      bc.appendChild(sep);
    }
    const crumb = document.createElement("span");
    crumb.textContent = crumbLabel(i);
    if (i < path.length - 1) {
      crumb.className = "crumb-link";
      crumb.onclick = () => { path = path.slice(0, i + 1); render(); };
    }
    bc.appendChild(crumb);
  });

  content.innerHTML = "";

  if (editMode) {
    const bar = document.createElement("div");
    bar.className = "edit-bar";
    const hint = document.createElement("span");
    hint.className = "hint";
    hint.textContent = "Modo de edição ativo — edite, adicione ou remova itens.";
    bar.appendChild(hint);
    const dl = document.createElement("button");
    dl.className = "icon-btn";
    dl.textContent = "Baixar HTML atualizado";
    dl.onclick = downloadUpdatedHtml;
    bar.appendChild(dl);
    content.appendChild(bar);
  }

  const thread = document.createElement("div");
  thread.className = "thread";

  for (let i = 0; i < path.length - 1; i++) {
    const key = path[i];
    const node = tree[key];
    const nextKey = path[i + 1];
    const chosenOpt = (node.opts || []).find(o => o.to === nextKey);
    const block = document.createElement("div");
    block.className = "qa-block";

    if (node.q) {
      block.appendChild(buildQuestionBubble(key, node));
    } else if (node.a) {
      block.appendChild(buildInfoBubble(key, node));
    }

    if (chosenOpt) {
      const wrap = document.createElement("div");
      wrap.className = "chosen-wrap";
      const pill = document.createElement("div");
      pill.className = "chosen-pill";
      pill.textContent = chosenOpt.label;
      wrap.appendChild(pill);
      block.appendChild(wrap);
    }
    thread.appendChild(block);
  }

  const currentKey = path[path.length - 1];
  const node = tree[currentKey];
  const finalBlock = document.createElement("div");
  finalBlock.className = "qa-block";

  if (node.a) {
    finalBlock.appendChild(buildInfoBubble(currentKey, node, true));
  }

  if (node.q) {
    finalBlock.appendChild(buildQuestionBubble(currentKey, node));
  }

  if (node.opts) {
    const row = document.createElement("div");
    row.className = "pill-row";
    node.opts.forEach((opt, idx) => {
      const wrap = document.createElement("div");
      wrap.className = "pill-edit-wrap";
      const btn = document.createElement("button");
      btn.className = "pill-btn";
      btn.textContent = opt.label;
      btn.onclick = () => { path.push(opt.to); render(); };
      wrap.appendChild(btn);
      if (editMode) {
        const editO = document.createElement("button");
        editO.className = "icon-btn";
        editO.textContent = "Editar";
        editO.onclick = () => editOptionLabel(currentKey, idx);
        wrap.appendChild(editO);
        const delO = document.createElement("button");
        delO.className = "icon-btn danger";
        delO.textContent = "Excluir";
        delO.onclick = () => deleteOption(currentKey, idx);
        wrap.appendChild(delO);
      }
      row.appendChild(wrap);
    });
    finalBlock.appendChild(row);
  }

  if (editMode) {
    const actionsRow = document.createElement("div");
    actionsRow.style.cssText = "display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;";
    const addBtn = document.createElement("button");
    addBtn.className = "icon-btn";
    addBtn.textContent = "+ Adicionar opção";
    addBtn.onclick = () => addOption(currentKey);
    actionsRow.appendChild(addBtn);
    if (path.length > 1) {
      const del = document.createElement("button");
      del.className = "icon-btn danger";
      del.textContent = "Excluir este item";
      del.onclick = deleteCurrentNode;
      actionsRow.appendChild(del);
    }
    finalBlock.appendChild(actionsRow);
  }

  thread.appendChild(finalBlock);
  content.appendChild(thread);

  const actions = document.createElement("div");
  actions.className = "bottom-actions";
  if (path.length > 1) {
    const back = document.createElement("button");
    back.className = "nav-btn";
    back.textContent = "← Voltar uma etapa";
    back.onclick = () => { path.pop(); render(); };
    actions.appendChild(back);
  }
  const restart = document.createElement("button");
  restart.className = "nav-btn";
  restart.textContent = "↻ Recomeçar";
  restart.onclick = () => { path = ["root"]; render(); };
  actions.appendChild(restart);
  content.appendChild(actions);
}

function buildQuestionBubble(key, node) {
  const bubble = document.createElement("div");
  bubble.className = "bubble-q";
  const row = document.createElement("div");
  row.style.cssText = "display:flex; align-items:center; gap:8px;";
  const text = document.createElement("p");
  text.className = "q-text";
  text.textContent = node.q;
  row.appendChild(text);
  if (editMode) {
    const editQ = document.createElement("button");
    editQ.className = "icon-btn";
    editQ.textContent = "Editar";
    editQ.onclick = () => editQuestion(key);
    row.appendChild(editQ);
  }
  bubble.appendChild(row);
  return bubble;
}

function buildInfoBubble(key, node, isFinal) {
  const bubble = document.createElement("div");
  bubble.className = "bubble-info";
  if (isFinal) {
    const tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = "Ação recomendada";
    bubble.appendChild(tag);
    bubble.appendChild(document.createElement("br"));
  }
  const body = document.createElement("span");
  body.innerHTML = node.a;
  bubble.appendChild(body);
  if (editMode) {
    bubble.appendChild(document.createElement("br"));
    const editA = document.createElement("button");
    editA.className = "icon-btn";
    editA.style.marginTop = "10px";
    editA.textContent = "Editar resposta";
    editA.onclick = () => editAnswer(key);
    bubble.appendChild(editA);
  }
  return bubble;
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById("edit-toggle");
  btn.textContent = editMode ? "Sair do modo de edição" : "Modo de edição";
  btn.classList.toggle("active", editMode);
  render();
}

function slugify(s) {
  return (s || "item").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "").slice(0, 30) || "item";
}

function editQuestion(key) {
  const node = tree[key];
  const val = window.prompt("Editar pergunta:", node.q || "");
  if (val !== null && val.trim() !== "") { node.q = val.trim(); render(); }
}

function editAnswer(key) {
  const node = tree[key];
  const val = window.prompt("Editar resposta (pode usar <br> para quebrar linha e <b>texto</b> para negrito):", node.a || "");
  if (val !== null) { node.a = val; render(); }
}

function editOptionLabel(parentKey, idx) {
  const opt = tree[parentKey].opts[idx];
  const val = window.prompt("Editar texto da opção:", opt.label);
  if (val !== null && val.trim() !== "") { opt.label = val.trim(); render(); }
}

function deleteOption(parentKey, idx) {
  if (!window.confirm("Remover esta opção do menu? O conteúdo dela deixará de aparecer, mas isso não pode ser desfeito depois de baixar o arquivo.")) return;
  tree[parentKey].opts.splice(idx, 1);
  render();
}

function addOption(parentKey) {
  const label = window.prompt("Texto da nova opção (o que o agente vai clicar):");
  if (!label || !label.trim()) return;
  const isBranch = window.confirm("Essa opção vai abrir MAIS perguntas (uma ramificação)?\n\nOK = sim, terá mais perguntas dentro.\nCancelar = não, isso já é a resposta final.");
  let key = slugify(label);
  let suffix = 1;
  while (tree[key]) { suffix++; key = slugify(label) + "_" + suffix; }
  if (isBranch) {
    tree[key] = { q: "Nova pergunta — clique em Editar para escrever o texto", opts: [] };
  } else {
    const answerText = window.prompt("Digite o texto da resposta:") || "Clique em Editar resposta para escrever a orientação.";
    tree[key] = { a: answerText };
  }
  if (!tree[parentKey].opts) tree[parentKey].opts = [];
  tree[parentKey].opts.push({ label: label.trim(), to: key });
  path.push(key);
  render();
}

function deleteCurrentNode() {
  if (path.length <= 1) return;
  if (!window.confirm("Excluir este item e voltar para o anterior? Essa ação não pode ser desfeita depois de baixar o arquivo.")) return;
  const key = path[path.length - 1];
  const parentKey = path[path.length - 2];
  const opts = tree[parentKey].opts || [];
  const idx = opts.findIndex(o => o.to === key);
  if (idx > -1) opts.splice(idx, 1);
  delete tree[key];
  path.pop();
  render();
}

function downloadUpdatedHtml() {
  try {
    const treeJson = JSON.stringify(tree, null, 2);
    const re = /const tree = \{[\s\S]*?\};(\s*\n\nlet path)/;
    if (!re.test(ORIGINAL_HTML)) { alert("Não foi possível gerar o arquivo atualizado automaticamente."); return; }
    const updatedHtml = ORIGINAL_HTML.replace(re, (m, tail) => "const tree = " + treeJson + ";" + tail);
    const blob = new Blob(["<!DOCTYPE html>\n" + updatedHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "arvore-decisao-atendimento.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert("Erro ao gerar o arquivo: " + e.message);
  }
}

function search(term) {
  term = term.trim().toLowerCase();
  const content = document.getElementById("content");
  const bc = document.getElementById("breadcrumb");
  if (!term) { render(); return; }

  bc.innerHTML = "";
  const label = document.createElement("span");
  label.textContent = "Resultados da busca";
  bc.appendChild(label);

  const matches = [];
  Object.keys(tree).forEach(key => {
    const node = tree[key];
    const haystack = ((node.q || "") + " " + (node.a || "")).toLowerCase();
    if (haystack.includes(term) && node.a) {
      matches.push(key);
    }
  });

  content.innerHTML = "";
  if (matches.length === 0) {
    const empty = document.createElement("p");
    empty.className = "no-results";
    empty.textContent = "Nenhum resultado encontrado.";
    content.appendChild(empty);
    return;
  }

  matches.forEach(key => {
    const card = document.createElement("div");
    card.className = "answer-card";
    card.innerHTML = "<div style='font-weight:600;margin-bottom:6px;'>" + (findTitle(key)) + "</div>" + tree[key].a;
    content.appendChild(card);
  });
}

function findTitle(targetKey) {
  for (const key of Object.keys(tree)) {
    const opts = tree[key].opts || [];
    const found = opts.find(o => o.to === targetKey);
    if (found) return found.label;
  }
  return targetKey;
}

document.getElementById("search").addEventListener("input", (e) => search(e.target.value));

function applyTheme(isDark) {
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
}

if (window.matchMedia) {
  const media = window.matchMedia("(prefers-color-scheme: dark)");
  applyTheme(media.matches);
  media.addEventListener("change", (e) => applyTheme(e.matches));
}

render();
</script>
